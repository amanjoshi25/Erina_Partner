version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: erina_postgres
    restart: always
    environment:
      POSTGRES_USER: erina_admin
      POSTGRES_PASSWORD: erina_secure_password
      POSTGRES_DB: erina_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8.4
    container_name: erina_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@erina.in
      PGADMIN_DEFAULT_PASSWORD: admin_secure_pass
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
